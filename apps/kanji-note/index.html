<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#fafaf6">
<title>かんじノート — iPad学習ノート</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="topbar">
  <div class="brand">かんじノート</div>

  <div class="group modes">
    <button class="mode-btn active" data-mode="note">📝 ノート</button>
    <button class="mode-btn" data-mode="practice">🈯 漢字練習</button>
  </div>

  <div class="group tools">
    <button class="tool-btn active" data-tool="pen" title="ペン">✏️</button>
    <button class="tool-btn" data-tool="highlighter" title="マーカー">🖍️</button>
    <button class="tool-btn" data-tool="eraser" title="けしゴム">🧽</button>
    <div class="palette">
      <button class="swatch active" data-color="#1a1a1a" style="background:#1a1a1a"></button>
      <button class="swatch" data-color="#e53935" style="background:#e53935"></button>
      <button class="swatch" data-color="#1e88e5" style="background:#1e88e5"></button>
      <button class="swatch" data-color="#43a047" style="background:#43a047"></button>
      <button class="swatch" data-color="#fb8c00" style="background:#fb8c00"></button>
      <button class="swatch" data-color="#8e24aa" style="background:#8e24aa"></button>
    </div>
    <label class="thickness">
      <span>太さ</span>
      <input id="thickness" type="range" min="1" max="14" value="3">
    </label>
  </div>

  <div class="group actions">
    <button id="undo" title="元に戻す">↶</button>
    <button id="redo" title="やり直し">↷</button>
    <button id="clear" title="ページをクリア">クリア</button>
    <label class="toggle" title="Apple Pencilのみ受け付け（手のひら誤検出を防止）">
      <input id="pen-only" type="checkbox">
      <span>Pencilのみ</span>
    </label>
  </div>

  <div class="group pages" id="pages-group">
    <button id="prev-page" title="前のページ">◀</button>
    <span id="page-indicator">1 / 1</span>
    <button id="next-page" title="次のページ">▶</button>
    <button id="add-page" title="ページを追加">＋</button>
  </div>

  <div class="group storage">
    <button id="save" title="ローカルに保存">💾 保存</button>
    <button id="load" title="ローカルから読込">📂 読込</button>
  </div>
</header>

<main>
  <section id="canvas-area">
    <canvas id="board"></canvas>
    <div id="overlay"></div>
  </section>

  <aside id="practice-panel" hidden>
    <h2>漢字練習</h2>
    <p class="hint">お題の単語を入れて、マスの中に書いてみよう。<br>誤った漢字は自動で見つけて、ただしい字をおしえます。</p>

    <label class="row">
      <span>お題</span>
      <input id="target-word" type="text" maxlength="12" value="学校" inputmode="text" autocomplete="off">
      <button id="set-target" class="primary">セット</button>
    </label>

    <label class="row">
      <input id="auto-judge" type="checkbox" checked>
      <span>自動はんてい（書き終わったら自動で見つける）</span>
    </label>

    <label class="row">
      <input id="show-ghost" type="checkbox" checked>
      <span>お手本うすく表示</span>
    </label>

    <div class="actions-row">
      <button id="check-all" class="primary">いま判定する</button>
      <button id="reset-cells">マスをクリア</button>
    </div>

    <div id="results"></div>

    <details class="advanced">
      <summary>くわしい結果（こうほの漢字）</summary>
      <div id="advanced-results"></div>
    </details>
  </aside>
</main>

<div id="toast" hidden></div>

<script src="recognizer.js"></script>
<script src="app.js"></script>
</body>
</html>
