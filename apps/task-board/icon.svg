<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1124"/>
      <stop offset="1" stop-color="#080a14"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#ff3df0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="40" y="40" width="432" height="432" rx="96" fill="none" stroke="#1d2c52" stroke-width="3"/>
  <g filter="url(#glow)">
    <!-- 上段：チェック済みの行 -->
    <rect x="120" y="150" width="56" height="56" rx="16" fill="url(#ac)"/>
    <path d="M134 178l12 12 22-24" fill="none" stroke="#05060d" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="200" y="166" width="190" height="22" rx="11" fill="#00e5ff" opacity="0.85"/>
    <!-- 中段 -->
    <rect x="120" y="234" width="56" height="56" rx="16" fill="none" stroke="#00e5ff" stroke-width="6"/>
    <rect x="200" y="250" width="150" height="22" rx="11" fill="#7f8bb5" opacity="0.7"/>
    <!-- 下段 -->
    <rect x="120" y="318" width="56" height="56" rx="16" fill="none" stroke="#ff3df0" stroke-width="6"/>
    <rect x="200" y="334" width="170" height="22" rx="11" fill="#ff3df0" opacity="0.6"/>
  </g>
</svg>
